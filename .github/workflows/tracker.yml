name: Update Lake James Federal Legislation Tracker

on:
  schedule:
    # Runs every Sunday at 13:00 UTC (8:00 AM EST)
    - cron: '0 15 * * *'
  workflow_dispatch: # Allows you to manually trigger the script anytime via the GitHub UI

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests

      - name: Run Congress API Script
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python script.py

      - name: Commit and push updated CSV
        run: |
          python script.py > script_stdout.log 2>&1 || echo "script.py exited $?"
          echo "=== script stdout/stderr ==="
          tail -n +1 script_stdout.log || true
          echo "=== CSV preview ==="
          ls -l lake_james_federal_legislation.csv || true
          head -n 50 lake_james_federal_legislation.csv || true

name: Update Lake James Federal Legislation Tracker

on:
  schedule:
    # Runs every Sunday at 13:00 UTC (8:00 AM EST)
    - cron: '0 15 * * *'
  workflow_dispatch: # Allows you to manually trigger the script anytime via the GitHub UI

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4.20

      - name: Set up Node.js
        uses: actions/setup-node@v4.20
        with:
          node-version: '24'
      
      - name: Install dependencies
        run: npm install

      - name: Run Congress API Script
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node Script.js

      - name: Commit and push updated CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lake_james_federal_legislation.csv
          git commit -m "Automated Daily Update: Lake James Federal Legislation" || echo "No changes to commit"
          git push origin main
